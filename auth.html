<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare | Login & Register</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "index.html";
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-bg">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card auth-card shadow-lg p-5 border-0 text-center" style="max-width: 450px; width: 100%;">
            <i class="bi bi-hospital-fill text-primary display-1 mb-3"></i>
            <h2 class="fw-bold">MEDICARE PORTAL</h2>
            <p class="text-muted mb-4">Access restricted. Please authenticate to continue.</p>

            <div id="loginForm">
                <form onsubmit="handleAuth(event, 'login')">
                    <div class="mb-3">
                        <input type="email" class="form-control py-2" placeholder="Email Address" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control py-2" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login to Account</button>
                </form>
                <button class="btn btn-link mt-3 text-decoration-none" onclick="toggleAuthForms()">Don't have an account? Register</button>
            </div>

            <div id="registerForm" class="d-none">
                <form onsubmit="handleAuth(event, 'register')">
                    <div class="mb-3">
                        <input type="text" class="form-control py-2" placeholder="Full Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control py-2" placeholder="Email Address" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control py-2" placeholder="Create Password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Create Account</button>
                </form>
                <button class="btn btn-link mt-3 text-decoration-none" onclick="toggleAuthForms()">Already registered? Login</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
